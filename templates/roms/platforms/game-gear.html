{% extends 'common/base.html' %}
{% load static %}
{% block title %}Game Gear | CHECKPOINT{% endblock %}


{% block content %}
<section class="most-downloaded-section">
    <div class="most-downloaded-header">
        <h1 class="most-downloaded-title">Game Gear</h1>
        <div class="most-downloaded-subtitle">Released: 1990</div>
        <div class="most-downloaded-subtitle">Total Games: 300</div>
    </div>
    <form class="platform-search-form" method="get" action="#">
        <input type="text" name="q" class="platform-search-input" placeholder="Search Game Gear games...">
        <button type="submit" class="platform-search-btn">Search</button>
    </form>
    <div class="most-downloaded-list nes-most-downloaded-list">
        <a href="{% url 'roms details' %}" class="most-downloaded-card-link">
            <div class="most-downloaded-card">
                <img src="{% static 'images/temp_images/sonic-the-hedgehog-sega-master-system-front-cover.jpg' %}" alt="Sonic the Hedgehog" class="most-downloaded-card-img">
                <div class="most-downloaded-card-info">
                    <h2 class="most-downloaded-card-title">Sonic the Hedgehog</h2>
                    <div class="most-downloaded-card-downloads">⬇ 600,000 downloads</div>
                </div>
            </div>
        </a>
    </div>
    <div class="most-downloaded-list nes-most-downloaded-list no-games-uploaded centered-upload-box centered-flex">
        <p class="no-games-message">No games uploaded yet.<br>Be the first to share a game!</p>
        <a href="{% url 'roms upload' %}" class="upload-game-btn"><span>Upload Now</span></a>
    </div>
</section>
{% endblock %}
