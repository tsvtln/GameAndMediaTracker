{% extends 'common/base.html' %}
{% block title %}Contacts | CHECKPOINT{% endblock %}
{% block content %}
<section class="contacts-section">
    <h1 class="contacts-title">Contact Me</h1>
    <p class="contacts-text">
        Contact me directly at <br><a href="mailto:checkpoint@tsvtln.com" class="contacts-link">checkpoint@tsvtln.com</a><br>
        or use the contact form below
    </p>
    <form class="contacts-form" method="post" action="#">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="email">E-Mail:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject" required>
        </div>
        <div class="form-group">
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
        </div>
        <button type="submit" class="contacts-submit">Send</button>
    </form>
</section>
{% endblock %}
