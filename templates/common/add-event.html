{% extends 'common/base.html' %}
{% load static %}

{% block title %}Add Community Event | CHECKPOINT{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/events.css' %}">
<div class="add-event-section">
    <h1 class="add-event-title">ADD COMMUNITY EVENT</h1>
    <div class="add-event-desc">Create a new event for the community calendar.</div>
    <div class="add-event-note">Events will appear on the Community &gt; Events page.</div>
    <form class="add-event-form">
        <div class="add-event-form-row">
            <label for="event-title">Event Title</label>
            <input type="text" id="event-title" name="event-title" placeholder="SNES Speedrun Challenge" required>
        </div>
        <div class="add-event-form-row">
            <label for="event-date">Event Date</label>
            <input type="date" id="event-date" name="event-date" required>
        </div>
        <div class="add-event-form-row">
            <label for="event-time">Event Time <span class="add-event-optional">(Optional)</span></label>
            <input type="time" id="event-time" name="event-time">
        </div>
        <div class="add-event-form-row">
            <label for="event-platform">Platform <span class="add-event-optional">(Optional)</span></label>
            <select id="event-platform" name="event-platform">
                <option>All Platforms</option>
                <option>PC</option>
                <option>NES</option>
                <option>Famicom</option>
                <option>SNES</option>
                <option>Super Famicom</option>
                <option>Nintendo 64</option>
                <option>GameCube</option>
                <option>Wii</option>
                <option>Wii U</option>
                <option>Nintendo Switch</option>
                <option>Game Boy</option>
                <option>Game Boy Color</option>
                <option>Game Boy Advance</option>
                <option>Nintendo DS</option>
                <option>Nintendo 3DS</option>
                <option>Sega Master System</option>
                <option>Sega Genesis / Mega Drive</option>
                <option>Sega CD</option>
                <option>32X</option>
                <option>Sega Saturn</option>
                <option>Sega Dreamcast</option>
                <option>Game Gear</option>
                <option>PlayStation</option>
                <option>PlayStation 2</option>
                <option>PlayStation 3</option>
                <option>PlayStation Portable (PSP)</option>
                <option>PlayStation Vita</option>
                <option>Xbox</option>
                <option>Xbox 360</option>
                <option>Xbox One</option>
                <option>Atari</option>
            </select>
        </div>
        <div class="add-event-form-row">
            <label for="event-type">Event Type <span class="add-event-optional">(Optional)</span></label>
            <input type="text" id="event-type" name="event-type" placeholder="Speedrun, Tournament, Meetup, etc.">
        </div>
        <div class="add-event-form-row">
            <label for="event-description">Description</label>
            <textarea id="event-description" name="event-description" rows="5" placeholder="Join the community speedrun challenge for Super Mario World. Post your best time in the forum thread." required></textarea>
        </div>
        <div class="add-event-form-row">
            <label for="event-status">Status <span class="add-event-optional">(Optional)</span></label>
            <select id="event-status" name="event-status">
                <option>Upcoming</option>
                <option>Passed</option>
            </select>
        </div>
        <div class="add-event-form-actions">
            <button type="submit" class="add-event-submit-btn">Create Event</button>
            <a href="{% url 'community events page' %}" class="add-event-cancel-btn">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
