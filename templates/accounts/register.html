{% extends 'common/base.html' %}
{% load static %}

{% block title %}Register | CHECKPOINT{% endblock %}

{% block content %}
<section class="register-section">
    <h1 class="accounts-title">REGISTER</h1>
    <div class="register-desc">Create a new account to access saves, favorites, and more.</div>
    <form class="register-form" method="post">
        {% csrf_token %}
        <label for="username" class="register-label">Username</label>
        <input type="text" id="username" name="username" class="styled-input" placeholder="Choose a username" required>

        <label for="email" class="register-label">E-Mail</label>
        <input type="email" id="email" name="email" class="styled-input" placeholder="Enter your e-mail" required>

        <label for="password" class="register-label">Password</label>
        <input type="password" id="password" name="password" class="styled-input" placeholder="Create a password" required>

        <label for="confirm_password" class="register-label">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" class="styled-input" placeholder="Repeat your password" required>

        <button type="submit" class="download-btn">REGISTER</button>
        <div class="register-links">
            <a href="{% url 'login' %}" class="register-link">Already have an account? Login</a>
        </div>
    </form>
</section>
<link rel="stylesheet" href="{% static 'css/accounts.css' %}">
{% endblock %}
